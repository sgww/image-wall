        const date = new Date(isoString);

    // ========== 图片上传到 ImgBB ==========
    async function uploadToImgBB(file) {
        return new Promise((resolve, reject) => {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', IMGBB_API_KEY);

            fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data && data.data && data.data.url) {
                    let imgUrl = data.data.url;
                    if (imgUrl.startsWith('http://')) imgUrl = imgUrl.replace('http://', 'https://');
                    resolve(imgUrl);
                } else {
                    reject(new Error(data.error?.message || '图床上传失败'));
                }
            })
            .catch(reject);
        });
    }

        // API 返回的内容是 base64 编码的，需要解码
        const content = result.content;
        const decodedContent = decodeURIComponent(escape(atob(content)));
        const data = JSON.parse(decodedContent);

        if (data && data.images && Array.isArray(data.images)) {
            const targetLength = TITLES.length;
            if (data.images.length === targetLength) {
                imagesData = data.images;
            } else if (data.images.length > targetLength) {
                imagesData = data.images.slice(0, targetLength);
                console.warn(`云端数据数量(${data.images.length})超过TITLES数量(${targetLength})，已自动截取`);
            } else {
                imagesData = [...data.images];
                for (let i = data.images.length; i < targetLength; i++) {
                    imagesData.push({ url: '', time: null });
                }
                console.warn(`云端数据数量(${data.images.length})不足TITLES数量(${targetLength})，已自动填充`);
            }
            updateStatusUI('connected', `已从云端同步 (${new Date().toLocaleTimeString()})`);
            return true;
        } else {
            throw new Error('数据格式错误，data.json 应包含 images 数组');
        }
    } catch (err) {
        console.error('加载失败:', err);
        updateStatusUI('error', `加载失败: ${err.message}`);
        // 初始化空数据
        imagesData = [];
        for (let i = 0; i < TITLES.length; i++) {
            imagesData.push({ url: '', time: null });
        }
        return false;
    }
}

    // 通过 Gitee API 写入数据（写入需要API，因为需要认证）
    async function saveToGitee() {
        if (!giteeConfig || !giteeConfig.owner || !giteeConfig.repo || !giteeConfig.token) {
            updateStatusUI('error', '请先配置Gitee信息');
            return false;
        }

        try {
            // 1. 先获取文件的 SHA
            const getUrl = `https://gitee.com/api/v5/repos/${giteeConfig.owner}/${giteeConfig.repo}/contents/data.json`;
            const getRes = await fetch(`${getUrl}?access_token=${giteeConfig.token}`);

            if (!getRes.ok) {
                throw new Error('获取文件信息失败');
            }

            const fileInfo = await getRes.json();

            // 2. 准备要写入的内容
            const content = JSON.stringify({ images: imagesData }, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(content)));

            // 3. 更新文件
            const updateRes = await fetch(getUrl, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    access_token: giteeConfig.token,
                    content: encodedContent,
                    sha: fileInfo.sha,
                    message: `Update images - ${new Date().toLocaleString()}`,
                    branch: giteeConfig.branch
                })
            });

            if (updateRes.ok) {
                updateStatusUI('connected', `已保存到云端 (${new Date().toLocaleTimeString()})`);
                return true;
            } else {
                const errData = await updateRes.json();
                throw new Error(errData.message || '保存失败');
            }
        } catch (err) {
            console.error('保存到Gitee失败:', err);
            updateStatusUI('error', `保存失败: ${err.message}`);
            return false;
        }
    }

    // ========== UI 渲染 ==========
    function renderSingleCard(index) {
        const card = document.getElementById(`card-${index}`);
        if (!card) return;
        const data = imagesData[index] || { url: '', time: null };

        const imgFrame = card.querySelector('.image-frame');
        if (imgFrame) {
            if (data.url) {
                imgFrame.innerHTML = `
                    <img src="${data.url}" alt="图片" loading="lazy" data-index="${index}" onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'placeholder-icon\'><span>🖼️</span><span>加载失败</span></div>'">
                    <div class="upload-hint">� 点击查看 | 📸 按钮替换</div>
                `;
            } else {
                imgFrame.innerHTML = `
                    <div class="placeholder-icon">
                        <span style="font-size:40px;">🖼️</span>
                        <span>点击上传图片</span>
                    </div>
                    <div class="upload-hint">📸 点击上传</div>
                `;
            }

            const newFrame = card.querySelector('.image-frame');
            newFrame.style.cursor = data.url ? 'zoom-in' : 'pointer';
            newFrame.onclick = (e) => {
                e.stopPropagation();
                if (data.url) {
                    openLightbox(index);
                } else {
                    triggerUpload(index);
                }
            };
        }

        const timeSpan = card.querySelector('.time-text');
        if (timeSpan) {
            timeSpan.textContent = `🕒 ${formatTime(data.time)}`;
        }
    }

    function renderAllCards() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';

        // 按更新时间排序：有图片的按时间倒序排，空卡片排在最后
        let sortedIndices = imagesData
            .map((item, idx) => ({ idx, item }))
            .sort((a, b) => {
                if (!a.item.url && b.item.url) return 1;
                if (a.item.url && !b.item.url) return -1;
                if (!a.item.url && !b.item.url) return 0;
                const timeA = a.item.time ? new Date(a.item.time).getTime() : 0;
                const timeB = b.item.time ? new Date(b.item.time).getTime() : 0;
                return timeB - timeA;
            });

        // 搜索过滤：如果有搜索关键词，只显示匹配的卡片
        if (searchKeyword.trim()) {
            const keyword = searchKeyword.trim().toLowerCase();
            sortedIndices = sortedIndices.filter(({ idx }) => 
                TITLES[idx].toLowerCase().includes(keyword)
            );
        }

        sortedIndices.forEach((sorted) => {
            const i = sorted.idx;
            const data = sorted.item || { url: '', time: null };
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${i}`;
            card.dataset.originalIndex = i;

            const imageInner = data.url ?
                `<img src="${data.url}" alt="图片" loading="lazy" data-index="${i}" onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'placeholder-icon\'><span>🖼️</span><span>加载失败</span></div>'">` :
                `<div class="placeholder-icon"><span style="font-size:40px;">🖼️</span><span>点击上传图片</span></div>`;

            const hintText = data.url ? '🔍 点击查看 | 📸 按钮替换' : '📸 点击上传';
            const cursorStyle = data.url ? 'cursor:zoom-in;' : 'cursor:pointer;';

            card.innerHTML = `
                <div class="card-header">
                    <span>${TITLES[i]}</span>
                    <span class="card-number">#${i+1}</span>
                </div>
                <div class="image-frame" style="${cursorStyle}">
                    ${imageInner}
                    <div class="upload-hint">${hintText}</div>
                </div>
                <div class="card-actions">
                    <button class="upload-btn">
                        📤 上传/替换图片
                    </button>
                    <div class="time-info">
                        <span>📅</span>
                        <span class="time-text">🕒更新时间  ${formatTime(data.time)}</span>
                    </div>
                    <div class="loading-indicator"></div>
                </div>
            `;
            grid.appendChild(card);
        });

        // 绑定事件
        for (let i = 0; i < TITLES.length; i++) {
            const card = document.getElementById(`card-${i}`);
            if (!card) continue;
            const imgFrame = card.querySelector('.image-frame');
            const uploadBtn = card.querySelector('.upload-btn');

            imgFrame.onclick = (e) => {
                e.stopPropagation();
                const originalIdx = parseInt(card.dataset.originalIndex);
                const data = imagesData[originalIdx] || { url: '', time: null };
                if (data.url) {
                    openLightbox(originalIdx);
                } else {
                    triggerUpload(originalIdx);
                }
            };
            uploadBtn.onclick = (e) => {
                e.preventDefault();
                const originalIdx = parseInt(card.dataset.originalIndex);
                triggerUpload(originalIdx);
            };
        }
    }

    function setLoading(index, loading) {
        const card = document.getElementById(`card-${index}`);
        if (!card) return;
        const loadingDiv = card.querySelector('.loading-indicator');
        if (loadingDiv) {
            if (loading) {
                loadingDiv.textContent = '⏳ 上传中，请稍候...';
                loadingDiv.style.display = 'block';
            } else {
                loadingDiv.style.display = 'none';
            }
        }
    }

    // ========== 上传主逻辑 ==========
    async function triggerUpload(index) {
        if (uploadingFlags[index]) {
            showToast('正在上传中，请稍后...');
            return;
        }

        if (!giteeConfig || !giteeConfig.owner || !giteeConfig.repo) {
            showToast('请先在顶部配置Gitee信息');
            return;
        }

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/jpeg,image/png,image/gif,image/webp';
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 32 * 1024 * 1024) {
                showToast('图片不能超过32MB');
                return;
            }

            uploadingFlags[index] = true;
            setLoading(index, true);

            try {
                // 1. 上传图片到 ImgBB
                const imageUrl = await uploadToImgBB(file);

                // 2. 更新本地数据
                imagesData[index] = {
                    url: imageUrl,
                    time: new Date().toISOString()
                };

                // 3. 保存到 Gitee
                await saveToGitee();

                // 4. 刷新UI
                renderSingleCard(index);
                showToast(`✅ ${TITLES[index]} 图片已更新，全球可见！`);

            } catch (err) {
                console.error(err);
                showToast(`❌ 上传失败: ${err.message}`);
            } finally {
                uploadingFlags[index] = false;
                setLoading(index, false);
            }
        };
        fileInput.click();
    }

    async function manualRefresh() {
        if (!giteeConfig || !giteeConfig.owner || !giteeConfig.repo) {
            showToast('请先配置Gitee信息');
            return;
        }
        showToast('正在同步云端数据...');
        await loadFromGitee();
        renderAllCards();
        showToast('同步完成');
    }

    // ========== 灯箱功能 ==========
    let currentLightboxIndex = -1;
    let lightboxScale = 1;
    let isClosingFromPopState = false;

    function openLightbox(index) {
        currentLightboxIndex = index;
        lightboxScale = 1;
        isClosingFromPopState = false;

        const overlay = document.getElementById('lightboxOverlay');
        const image = document.getElementById('lightboxImage');
        const content = document.getElementById('lightboxContent');
        const prevBtn = document.getElementById('lightboxPrev');
        const nextBtn = document.getElementById('lightboxNext');

        const data = imagesData[index] || { url: '' };
        image.src = data.url;
        content.style.transform = 'scale(1)';

        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        // 显示导航按钮（如果有其他图片）
        const hasPrev = index > 0 && imagesData[index - 1] && imagesData[index - 1].url;
        const hasNext = index < imagesData.length - 1 && imagesData[index + 1] && imagesData[index + 1].url;
        prevBtn.style.display = hasPrev ? 'block' : 'none';
        nextBtn.style.display = hasNext ? 'block' : 'none';

        // 添加历史记录状态，让手机返回按钮关闭图片而不是页面
        history.pushState({ lightboxOpen: true }, '', window.location.pathname + window.location.search + window.location.hash);
    }

    function closeLightbox() {
        const overlay = document.getElementById('lightboxOverlay');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        currentLightboxIndex = -1;
        lightboxScale = 1;

        // 如果不是从 popstate 触发的关闭，需要回退历史记录
        if (!isClosingFromPopState && window.history.state && window.history.state.lightboxOpen) {
            window.history.back();
        }
    }

    function navigateLightbox(direction) {
        let newIndex = currentLightboxIndex + direction;

        // 查找有图片的下一张/上一张
        while (newIndex >= 0 && newIndex < imagesData.length) {
            if (imagesData[newIndex] && imagesData[newIndex].url) {
                break;
            }
            newIndex += direction;
        }

        if (newIndex >= 0 && newIndex < imagesData.length) {
            openLightbox(newIndex);
        }
    }

    function handleLightboxWheel(e) {
        e.preventDefault();
        const content = document.getElementById('lightboxContent');
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        lightboxScale = Math.max(0.5, Math.min(3, lightboxScale + delta));
        content.style.transform = `scale(${lightboxScale})`;
    }

    function handleLightboxContentClick(e) {
        e.stopPropagation();
        const content = document.getElementById('lightboxContent');
        lightboxScale = lightboxScale >= 2 ? 1 : 2;
        content.style.transform = `scale(${lightboxScale})`;
    }

    // 绑定灯箱事件
    function bindLightboxEvents() {
        const overlay = document.getElementById('lightboxOverlay');
        const closeBtn = document.getElementById('lightboxClose');
        const content = document.getElementById('lightboxContent');
        const prevBtn = document.getElementById('lightboxPrev');
        const nextBtn = document.getElementById('lightboxNext');

        overlay.onclick = closeLightbox;
        closeBtn.onclick = closeLightbox;
        content.onclick = handleLightboxContentClick;
        content.onwheel = handleLightboxWheel;
        prevBtn.onclick = (e) => {
            e.stopPropagation();
            navigateLightbox(-1);
        };
        nextBtn.onclick = (e) => {
            e.stopPropagation();
            navigateLightbox(1);
        };

        document.addEventListener('keydown', (e) => {
            if (currentLightboxIndex >= 0) {
                if (e.key === 'Escape') {
                    closeLightbox();
                } else if (e.key === 'ArrowLeft') {
                    navigateLightbox(-1);
                } else if (e.key === 'ArrowRight') {
                    navigateLightbox(1);
                }
            }
        });

        // 监听历史记录变化，处理手机返回按钮
        window.addEventListener('popstate', (e) => {
            if (currentLightboxIndex >= 0) {
                // 防止递归调用 history.back()
                isClosingFromPopState = true;
                const overlay = document.getElementById('lightboxOverlay');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                currentLightboxIndex = -1;
                lightboxScale = 1;
            }
        });
    }

    // ========== 初始化 ==========
    async function init() {
        // 检查硬编码配置是否有效
        const isConfigValid = giteeConfig && giteeConfig.owner && giteeConfig.repo && giteeConfig.token;
        if (isConfigValid) {
            await loadFromGitee();
            renderAllCards();
        } else {
            updateStatusUI('error', '请在代码中配置Gitee信息');
            // 初始化空数据
            imagesData = [];
            for (let i = 0; i < TITLES.length; i++) {
                imagesData.push({ url: '', time: null });
            }
            renderAllCards();
        }

        document.getElementById('manualRefreshBtn').onclick = () => manualRefresh();

        // 绑定搜索框事件
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            renderAllCards();
        });

        // 绑定灯箱事件
        bindLightboxEvents();
    }

    init();
</script>
